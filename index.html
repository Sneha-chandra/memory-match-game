<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match — Sneha Chandra</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
    --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
    --text: #e6edf3; --muted: #8b949e; --radius: 10px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 18px;
    padding: 20px;
  }
  h1 { font-size: 28px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }
  .subtitle { color: var(--muted); font-size: 13px; }

  .stats {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .stat {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 20px; text-align: center;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

  .controls-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  button {
    background: var(--accent); border: none; border-radius: 6px;
    color: #000; font-size: 13px; font-weight: 700;
    padding: 8px 18px; cursor: pointer; transition: opacity .2s;
  }
  button:hover { opacity: .85; }
  .diff-btn { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .diff-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .board {
    display: grid; gap: 10px;
  }
  .board.grid-4 { grid-template-columns: repeat(4, 1fr); max-width: 360px; }
  .board.grid-6 { grid-template-columns: repeat(6, 1fr); max-width: 480px; }

  .card {
    width: 80px; height: 80px; cursor: pointer;
    perspective: 600px; flex-shrink: 0;
  }
  .board.grid-6 .card { width: 70px; height: 70px; }

  .card-inner {
    width: 100%; height: 100%;
    transform-style: preserve-3d; transition: transform 0.35s ease;
    position: relative;
  }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute; inset: 0; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    backface-visibility: hidden; font-size: 32px;
  }
  .board.grid-6 .card-front, .board.grid-6 .card-back { font-size: 26px; }

  .card-back {
    background: var(--bg2); border: 2px solid var(--border);
    font-size: 22px; color: var(--muted);
  }
  .card-front {
    background: var(--bg3); border: 2px solid var(--border);
    transform: rotateY(180deg);
    transition: background 0.2s;
  }
  .card.matched .card-front {
    background: rgba(63,185,80,0.15);
    border-color: var(--green);
    box-shadow: 0 0 14px rgba(63,185,80,0.2);
  }

  #win-banner {
    display: none; flex-direction: column; align-items: center;
    gap: 10px; padding: 24px 40px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; text-align: center;
    box-shadow: 0 0 40px rgba(88,166,255,0.1);
  }
  #win-banner.show { display: flex; }
  #win-banner h2 { font-size: 26px; color: var(--green); }
  #win-banner p { color: var(--muted); font-size: 14px; }

  .timer-bar-wrap {
    width: 100%; max-width: 400px; height: 4px;
    background: var(--bg3); border-radius: 2px; overflow: hidden;
  }
  .timer-bar { height: 100%; background: var(--accent); transition: width 0.1s linear; border-radius: 2px; }
</style>
</head>
<body>

<h1>🃏 Memory Match</h1>
<p class="subtitle">by Sneha Chandra · Find all matching pairs!</p>

<div class="stats">
  <div class="stat"><div class="stat-label">Moves</div><div class="stat-val" id="moves">0</div></div>
  <div class="stat"><div class="stat-label">Pairs</div><div class="stat-val" id="pairs">0</div></div>
  <div class="stat"><div class="stat-label">Time</div><div class="stat-val" id="timer">0s</div></div>
  <div class="stat"><div class="stat-label">Best Moves</div><div class="stat-val" id="best">—</div></div>
</div>

<div class="controls-row">
  <button class="diff-btn active" id="btn-easy"   onclick="setDiff(4,'easy')">4×4 Easy</button>
  <button class="diff-btn"        id="btn-hard"   onclick="setDiff(6,'hard')">6×6 Hard</button>
  <button onclick="newGame()">New Game</button>
</div>

<div id="win-banner">
  <h2>🎉 You Won!</h2>
  <p id="win-msg">Completed in 0 moves and 0s</p>
  <button onclick="newGame()">Play Again</button>
</div>

<div class="board grid-4" id="board"></div>

<script>
const EMOJIS_ALL = [
  '🚀','🔥','⚡','🌊','🎯','💎','🦊','🐉',
  '🎸','🏆','🌈','💡','🎲','🧩','🤖','🦋',
  '🍕','🎃','👾','🌸','🦄','🎮','🧠','🔮',
];

let cols = 4, diff = 'easy';
let cards = [], flipped = [], matched = 0, moves = 0;
let locked = false, started = false, timerInterval;
let elapsed = 0;

function setDiff(c, d) {
  cols = c; diff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + d).classList.add('active');
  newGame();
}

function newGame() {
  clearInterval(timerInterval);
  elapsed = 0; moves = 0; matched = 0; flipped = []; locked = false; started = false;
  const total = cols * cols;
  const pairCount = total / 2;
  const emojis = EMOJIS_ALL.slice(0, pairCount);
  const deck = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
  cards = deck.map((emoji, i) => ({ id: i, emoji, flipped: false, matched: false }));

  document.getElementById('moves').textContent = 0;
  document.getElementById('pairs').textContent = `0/${pairCount}`;
  document.getElementById('timer').textContent = '0s';
  document.getElementById('win-banner').classList.remove('show');

  const bestKey = `memory-best-${diff}`;
  const best = localStorage.getItem(bestKey);
  document.getElementById('best').textContent = best ? best + ' moves' : '—';

  render();
}

function startTimer() {
  if (started) return;
  started = true;
  timerInterval = setInterval(() => {
    elapsed++;
    document.getElementById('timer').textContent = elapsed + 's';
  }, 1000);
}

function flip(id) {
  if (locked) return;
  const card = cards[id];
  if (card.flipped || card.matched) return;
  startTimer();

  card.flipped = true;
  flipped.push(id);
  renderCard(id);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    locked = true;
    setTimeout(checkMatch, 700);
  }
}

function checkMatch() {
  const [a, b] = flipped;
  if (cards[a].emoji === cards[b].emoji) {
    cards[a].matched = cards[b].matched = true;
    matched++;
    const pairCount = (cols * cols) / 2;
    document.getElementById('pairs').textContent = `${matched}/${pairCount}`;
    renderCard(a); renderCard(b);
    if (matched === pairCount) win();
  } else {
    cards[a].flipped = cards[b].flipped = false;
    renderCard(a); renderCard(b);
  }
  flipped = [];
  locked = false;
}

function win() {
  clearInterval(timerInterval);
  const bestKey = `memory-best-${diff}`;
  const prev = parseInt(localStorage.getItem(bestKey) || '9999');
  if (moves < prev) localStorage.setItem(bestKey, moves);
  document.getElementById('best').textContent = Math.min(moves, prev) + ' moves';
  document.getElementById('win-msg').textContent = `Completed in ${moves} moves and ${elapsed}s`;
  document.getElementById('win-banner').classList.add('show');
}

function render() {
  const board = document.getElementById('board');
  board.className = `board grid-${cols}`;
  board.innerHTML = '';
  cards.forEach(card => {
    const el = buildCard(card);
    board.appendChild(el);
  });
}

function renderCard(id) {
  const board = document.getElementById('board');
  const old = board.children[id];
  const card = cards[id];
  const el = buildCard(card);
  board.replaceChild(el, old);
}

function buildCard(card) {
  const wrap = document.createElement('div');
  wrap.className = 'card' + (card.flipped || card.matched ? ' flipped' : '') + (card.matched ? ' matched' : '');
  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-back">?</div>
      <div class="card-front">${card.emoji}</div>
    </div>`;
  if (!card.matched) wrap.addEventListener('click', () => flip(card.id));
  return wrap;
}

newGame();
</script>
</body>
</html>
